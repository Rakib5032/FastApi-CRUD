<!DOCTYPE html>
<html>

<head>
    <title>Delete Student</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 300px;
        }

        h2 {
            color: #333;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            /* Ensures padding doesn't affect width */
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #c0392b;
        }

        #msg {
            margin-top: 1rem;
            font-size: 0.9rem;
            min-height: 1.2rem;
        }

        .error {
            color: #d32f2f;
            background: #ffebee;
            padding: 8px;
            border-radius: 4px;
        }

        .success {
            color: #388e3c;
            background: #e8f5e9;
            padding: 8px;
            border-radius: 4px;
        }

        a {
            display: inline-block;
            margin-top: 1.5rem;
            color: #555;
            text-decoration: none;
            font-size: 0.85rem;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Delete Student</h2>

        <input type="text" id="student_id" placeholder="Enter Student ID">

        <button onclick="deleteStudent()">Delete</button>

        <p id="msg"></p>

        <a href="/">Back to Home</a>
    </div>

    <script>
        async function deleteStudent() {
            const id = document.getElementById("student_id").value;
            const msg = document.getElementById("msg");

            // Clear previous styles and text
            msg.innerText = "";
            msg.className = "";

            if (id === "") {
                msg.className = "error";
                msg.innerText = "Please enter Student ID";
                return;
            }

            if (!confirm("Are you sure you want to delete this student?")) {
                return;
            }

            try {
                const response = await fetch("/api/delete/" + id, {
                    method: "DELETE"
                });

                if (response.status === 404) {
                    msg.className = "error";
                    msg.innerText = "Student not found";
                    return;
                }

                if (response.ok) {
                    msg.className = "success";
                    msg.innerText = "Student deleted successfully";
                    document.getElementById("student_id").value = "";
                } else {
                    msg.className = "error";
                    msg.innerText = "An error occurred while deleting.";
                }
            } catch (error) {
                msg.className = "error";
                msg.innerText = "Server connection failed.";
            }
        }
    </script>

</body>

</html>
