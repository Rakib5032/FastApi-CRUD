<!DOCTYPE html>
<html>

<head>
    <title>Register Student</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 95%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            background-color: #007BFF;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .home-btn {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            background-color: #6c757d;
            color: white;
            padding: 10px 16px;
            border-radius: 5px;
        }

        .home-btn:hover {
            background-color: #545b62;
        }

        #msg {
            margin-top: 10px;
            font-weight: bold;
            color: green;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Register Student</h2>

        <form id="registerForm">

            <input type="text" id="student_id" placeholder="Student ID">
            <input type="text" id="name" placeholder="Name">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <input type="text" id="dept" placeholder="Department">
            <input type="number" id="year" placeholder="Year">
            <input type="text" id="phone" placeholder="Phone">
            <input type="text" id="address" placeholder="Address">

            <button type="submit">Register</button>

        </form>

        <p id="msg"></p>

        <a class="home-btn" href="/">Back to Home</a>

    </div>

    <script>

        document.getElementById("registerForm").addEventListener("submit", async function (e) {

            e.preventDefault();

            const student = {
                student_id: document.getElementById("student_id").value,
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                dept: document.getElementById("dept").value,
                year: parseInt(document.getElementById("year").value),
                phone: document.getElementById("phone").value,
                address: document.getElementById("address").value
            };

            const response = await fetch("/api/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(student)
            });

            const msg = document.getElementById("msg");

            if (response.ok) {

                msg.style.color = "green";
                msg.innerText = "Student created successfully!";

                document.getElementById("registerForm").reset();

            } else {

                const error = await response.json();

                msg.style.color = "red";
                msg.innerText = error.detail || "Failed to create student";

            }
        });

    </script>

</body>

</html>
