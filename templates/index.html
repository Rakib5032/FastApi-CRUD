<!DOCTYPE html>
<html>

<head>
<title>Student Portal</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container{
    background: white;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    text-align: center;
    width: 350px;
}

h1{
    margin-bottom: 10px;
}

h3{
    margin-bottom: 20px;
    color: #555;
}

input{
    width: 100%;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
    margin-bottom: 15px;
    font-size: 14px;
}

button{
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 5px;
    background-color: #007BFF;
    color: white;
    font-size: 15px;
    cursor: pointer;
}

button:hover{
    background-color: #0056b3;
}

.register-link{
    display:block;
    margin-top:12px;
    text-decoration: none;
    color: #007BFF;
    font-weight: bold;
}

.register-link:hover{
    text-decoration: underline;
}

#msg{
    margin-top:10px;
    font-weight:bold;
}

.success{
    color:green;
}

.error{
    color:red;
}

</style>

</head>

<body>

<div class="container">

<h1>Student Portal</h1>

<h3>Search Student</h3>

<input type="text" id="student_id" placeholder="Enter Student ID">

<button onclick="searchStudent()">Search</button>

<p id="msg"></p>

<a class="register-link" href="/register">Register New Student</a>
<a class="register-link" href="/update">Update Existing Student</a>
<a class="register-link" href="/delete">Delete Existing Student</a>

</div>

<script>

async function searchStudent(){

    const id = document.getElementById("student_id").value;
    const msg = document.getElementById("msg");

    msg.innerText = "";
    msg.className = "";

    if(id === ""){
        msg.className = "error";
        msg.innerText = "Please enter Student ID";
        return;
    }

    try{

        const response = await fetch("/api/get/" + id);

        if(response.status === 404){
            msg.className = "error";
            msg.innerText = "Student Not Found";
            return;
        }

        msg.className = "success";
        msg.innerText = "Student Found";

        setTimeout(()=>{
            window.location.href = "/students/" + id;
        },80);

    }
    catch(error){

        msg.className = "error";
        msg.innerText = "Server error. Please try again.";

    }

}

</script>

</body>
</html>
