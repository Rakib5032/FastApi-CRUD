<!DOCTYPE html>
<html>

<head>
    <title>Update Student</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 10px;
            width: 420px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 95%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .search-box {
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        td {
            padding: 8px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .search-btn {
            background-color: #007BFF;
            color: white;
        }

        .search-btn:hover {
            background-color: #0056b3;
        }

        .update-btn {
            background-color: #28a745;
            color: white;
            margin-top: 15px;
        }

        .update-btn:hover {
            background-color: #1e7e34;
        }

        .home-btn {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            background-color: #6c757d;
            color: white;
            padding: 10px 16px;
            border-radius: 5px;
        }

        .home-btn:hover {
            background-color: #545b62;
        }

        #msg {
            color: red;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Update Student</h2>

        <div class="search-box">
            <input type="text" id="student_id" placeholder="Enter Student ID">
            <button class="search-btn" onclick="fetchStudent()">Search</button>
        </div>

        <p id="msg"></p>

        <form id="editForm">

            <table id="editTable" style="display:none;">
                <tr>
                    <td>Name</td>
                    <td><input type="text" id="name"></td>
                </tr>

                <tr>
                    <td>Email</td>
                    <td><input type="email" id="email"></td>
                </tr>

                <tr>
                    <td>Department</td>
                    <td><input type="text" id="dept"></td>
                </tr>

                <tr>
                    <td>Year</td>
                    <td><input type="number" id="year"></td>
                </tr>

                <tr>
                    <td>Phone</td>
                    <td><input type="text" id="phone"></td>
                </tr>

                <tr>
                    <td>Address</td>
                    <td><input type="text" id="address"></td>
                </tr>
            </table>

            <button type="button" id="updateBtn" class="update-btn" onclick="updateStudent()" style="display:none;">
                Update Student
            </button>

        </form>

        <button id="updateBtn" class="update-btn" onclick="updateStudent()" style="display:none;">
            Update Student
        </button>

        <br>

        <a class="home-btn" href="/">Back to Home</a>

    </div>

    <script>

        async function fetchStudent() {

            const id = document.getElementById("student_id").value;

            const response = await fetch("/api/get/" + id);

            if (response.status == 404) {

                document.getElementById("msg").innerText = "Student Not Found";
                return;

            }

            const student = await response.json();

            document.getElementById("editTable").style.display = "block";
            document.getElementById("updateBtn").style.display = "inline-block";

            document.getElementById("name").value = student.name;
            document.getElementById("email").value = student.email;
            document.getElementById("dept").value = student.dept;
            document.getElementById("year").value = student.year;
            document.getElementById("phone").value = student.phone;
            document.getElementById("address").value = student.address;

        }

        async function updateStudent() {

            const id = document.getElementById("student_id").value;

            const student = {

                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                dept: document.getElementById("dept").value,
                year: parseInt(document.getElementById("year").value),
                phone: document.getElementById("phone").value,
                address: document.getElementById("address").value

            };

            const response = await fetch("/api/update/" + id, {

                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(student)

            });

            if (response.ok){


                alert("Student Updated Successfully");
                document.getElementById("editForm").reset();
                document.getElementById("editTable").style.display = "none";
                document.getElementById("updateBtn").style.display = "none";
                document.getElementById("student_id").value = "";
            }
            else {

                const error = await response.json();
                alert("Update Failed: " + error.detail);

            }

        }

    </script>

</body>

</html>
